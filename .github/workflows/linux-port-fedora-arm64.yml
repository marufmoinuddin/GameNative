name: Linux Port Fedora ARM64 Gate

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "gamenative-linux/**"
      - "tools/**"
      - "packaging/fedora/**"
      - ".github/workflows/linux-port-fedora-arm64.yml"
  pull_request:
    paths:
      - "gamenative-linux/**"
      - "tools/**"
      - "packaging/fedora/**"
      - ".github/workflows/linux-port-fedora-arm64.yml"

jobs:
  fedora-arm64-runtime-gate:
    # Expected labels for a maintained self-hosted Fedora ARM64 runner.
    runs-on: [self-hosted, linux, ARM64, fedora]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required host tools
        run: |
          command -v java
          command -v wine
          command -v box64
          command -v vulkaninfo
          command -v rpmspec

      - name: Linux hardening check (blocking)
        run: ./tools/linux_phase6_hardening_check.sh

      - name: Runtime schema stability check (blocking)
        run: ./tools/phase6_schema_stability_check.sh

      - name: Security log check (blocking)
        run: ./tools/phase6_security_log_check.sh

      - name: RPM spec validation (blocking)
        run: ./tools/validate_rpm_spec.sh

      - name: Build release artifacts
        run: ./tools/build_linux_release_artifacts.sh 0.1.0

      - name: Verify release artifacts
        run: ./tools/verify_linux_release_artifacts.sh

      - name: Upload Fedora ARM64 release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gamenative-linux-fedora-arm64-release-artifacts
          path: |
            build/release/linux-arm64/*.tar.gz
            build/release/linux-arm64/*.sha256
            build/release/linux-arm64/*.spdx.json
            build/release/linux-arm64/release-manifest.txt
