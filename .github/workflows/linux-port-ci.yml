name: Linux Port CI

on:
  pull_request:
    paths:
      - "gamenative-linux/**"
      - "packaging/fedora/**"
      - "LINUX_ARM64_PORT_PLAN.md"
      - "docs/dev/onboarding.md"
      - "docs/architecture/**"
  push:
    branches:
      - main
    paths:
      - "gamenative-linux/**"
      - "packaging/fedora/**"

jobs:
  linux-port-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install RPM tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Gradle compile
        run: ./gradlew -p gamenative-linux :core:domain:compileKotlin :core:runtime:compileKotlin :core:store-steam:compileKotlin :desktop:shell:compileKotlin :infra:config:compileKotlin :infra:keyring:compileKotlin :infra:network:compileKotlin :infra:persistence:compileKotlin :infra:notifications:compileKotlin

      - name: Gradle tests
        run: ./gradlew -p gamenative-linux :infra:config:test :infra:keyring:test :infra:network:test :infra:persistence:test :infra:notifications:test :core:domain:test :core:store-steam:test :core:runtime:test :desktop:shell:test

      - name: Runtime proof (non-blocking in generic CI)
        run: ./gradlew -p gamenative-linux :core:runtime:runRuntimeProof || true

      - name: Android import audit
        run: test "$(rg -n '^import android\.' gamenative-linux | wc -l)" -eq 0

      - name: Build Linux release artifacts
        run: ./tools/build_linux_release_artifacts.sh 0.1.0

      - name: Validate RPM spec
        run: ./tools/validate_rpm_spec.sh

      - name: Verify release artifacts
        run: ./tools/verify_linux_release_artifacts.sh

      - name: Upload Linux release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gamenative-linux-release-artifacts
          path: |
            build/release/linux-arm64/*.tar.gz
            build/release/linux-arm64/*.sha256
            build/release/linux-arm64/*.spdx.json
            build/release/linux-arm64/release-manifest.txt
